services:
  write_project-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-write_project}
      - POSTGRES_USER=${POSTGRES_USER:-write_project}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-write_project}
    volumes:
      - ./server/data/postgres:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-1092}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-write_project} -d ${POSTGRES_DB:-write_project}"]
      interval: 5s
      timeout: 5s
      retries: 20

  write_project-backend:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "1091:1091"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-write_project}:${POSTGRES_PASSWORD:-write_project}@write_project-postgres:5432/${POSTGRES_DB:-write_project}}
      - DB_PATH=/data/scripts.db
      - DB_AUTO_CREATE_TABLES=${DB_AUTO_CREATE_TABLES:-1}
      - DB_RUN_LEGACY_MIGRATIONS=${DB_RUN_LEGACY_MIGRATIONS:-1}
      - PORT=1091
      - ENVIRONMENT=production
      - ALLOW_X_USER_ID=0
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-https://open-scripts.shawnup.com}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_CREDENTIALS=/secrets/firebase-service-account.json
      - FIREBASE_CREDENTIALS_JSON=${FIREBASE_CREDENTIALS_JSON}
      - ADMIN_USER_IDS=${ADMIN_USER_IDS}
      - ADMIN_USER_EMAILS=${ADMIN_USER_EMAILS}
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - ./server/data:/data
      - ./server/secrets:/secrets:ro
      - ./dist:/app/dist:ro
    depends_on:
      write_project-postgres:
        condition: service_healthy

  write_project-frontend-build:
    image: node:20-alpine
    working_dir: /app
    environment:
      - VITE_API_URL=${VITE_API_URL}
    volumes:
      - .:/app
    command: sh -c "npm install && npm run build"

  write_project-frontend:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "1090:80"
    volumes:
      - ./dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - write_project-frontend-build
      - write_project-backend
